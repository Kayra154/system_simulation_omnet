[General]
network = test2.LoRaNetworkTest

# Simulation control
sim-time-limit = 24h
warmup-period = 60s
simtime-resolution = -11
repeat = 30
rng-class = "cMersenneTwister"
record-eventlog = false

# Default patient count
**.numPatients = 20

# Vector recording
**.HospitalServer.app[0].queueLength:vector.vector-recording = true
**.HospitalServer.app[0].urgentWaitTime:vector.vector-recording = true
**.HospitalServer.app[0].normalWaitTime:vector.vector-recording = true
**.HospitalServer.app[0].urgentEndToEndDelay:vector.vector-recording = true
**.HospitalServer.app[0].normalEndToEndDelay:vector.vector-recording = true
**.loRaNodes[*].app[0].emergencyVariate:vector.vector-recording = true
**.vector-recording = false

