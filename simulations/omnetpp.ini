# Hospital Server variables
**.HospitalServer.numApps = 1
**.HospitalServer.app[0].typename = "HospitalServerApp"
**.HospitalServer.app[0].destPort = 2000
**.HospitalServer.app[0].localPort = 1000
**.HospitalServer.app[0].adrMethod = ${"avg"}
**.HospitalServer.**.evaluateADRinServer = true
**.HospitalServer.app[0].queueSize = 50
**.HospitalServer.app[0].expo_rate_lambda = 0.83 #This is the service rate of the server

# Gateway variable properties
**.loRaGateway.numUdpApps = 1
**.loRaGateway.packetForwarder.localPort = 2000
**.loRaGateway.packetForwarder.destPort = 1000
**.loRaGateway.packetForwarder.destAddresses = "HospitalServer"
**.loRaGateway.**.initFromDisplayString = false
**.loRaGateway.**.initialX = 544.00m
**.loRaGateway.**.initialY = 544.00m

# Patient Nodes
**.loRaNodes[*].numApps = 1
**.loRaNodes[*].app[0].typename = "PatientSensorApp"
**.loRaNodes[*].app[0].expo_rate_lambda = 0.00175
**.loRaNodes[*].app[0].emergencyThreshold = 50
**.loRaNodes[*].**.timeToFirstPacket = exponential(24s)
**.loRaNodes[*].**.timeToNextPacket = exponential(24s) #This is the arrival rate of the system
**.loRaNodes[*].**.numberOfPacketsToSend = 0   

**.loRaNodes[*].**.initialX = 300m
**.loRaNodes[*].**.initialY = 350m
**.loRaNodes[*].**initialLoRaSF = 12
**.loRaNodes[*].**initialLoRaTP = 14dBm
**.loRaNodes[*].**initialLoRaBW = 125 kHz
**.loRaNodes[*].**initialLoRaCR = 4
**.loRaNodes[*].**.initFromDisplayString = false
**.loRaNodes[*].**.evaluateADRinNode = true

**.loRaNodes[*].LoRaNic.radio.energyConsumer.typename = "LoRaEnergyConsumer"
**.loRaNodes[*].**.energySourceModule = "^.IdealEpEnergyStorage"
**.loRaNodes[*].LoRaNic.radio.energyConsumer.configFile = xmldoc("energyConsumptionParam.xml")

# Medium varialbes
**.maxTransmissionDuration = 4s
**.energyDetection = -110dBm
**.radio.radioMediumModule = "LoRaMedium"
**.minInterferenceTime = 0s
**.constraintAreaMinX = 0m
**.constraintAreaMinY = 0m
**.constraintAreaMinZ = 0m
**.constraintAreaMaxZ = 0m
**.constraintAreaMaxX = 3000.0m
**.constraintAreaMaxY = 3000.0m

**.vector-recording = true

[Config Sweep]
extends = General
**.numPatients = ${N=5, 10, 15, 20, 30, 40}